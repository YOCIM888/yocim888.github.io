<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - YOCIM轻站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/Home-Page.CSS"> 
    <style>
        body {
            background-image: url('../../public/images/daytime-girl.webp');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            min-height: 100vh;
            background-attachment: fixed;
        }
        
        body.dark {
            background-image: url('../../public/images/night-girl.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .search-header {
            margin: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .search-header .back-home {
            text-decoration: none;
            color: #333;
            font-size: 1.2rem;
        }
        .search-header .search-container {
            flex: 1;
            max-width: 600px;
            margin: 0;
        }

        .search-results-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-count {
            margin-bottom: 16px;
            color: #666;
            font-size: 0.95rem;
        }

        .search-empty {
            text-align: center;
            color: #999;
            padding: 60px 0;
            font-size: 1.1rem;
        }

        .result-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(220, 220, 230, 0.6);
            border-radius: 12px;
            padding: 18px 22px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .result-card:hover {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            transform: translateY(-1px);
        }
        .result-card:visited {
            color: inherit;
        }

        .result-card-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .result-title {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 600;
            color: #2d2d3d;
            line-height: 1.4;
        }
        .result-title mark {
            background: #ffe0ec;
            color: #c44569;
            padding: 1px 3px;
            border-radius: 3px;
        }

        .result-desc {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }
        .result-desc mark {
            background: #ffe0ec;
            color: #c44569;
            padding: 1px 3px;
            border-radius: 3px;
        }

        .result-tag {
            display: inline-block;
            margin-top: 6px;
            padding: 2px 10px;
            background: #e8d8f8;
            color: #6b4d8a;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .result-source {
            font-size: 0.8rem;
            color: #999;
            margin-top: 8px;
        }

        body.dark .search-header .back-home {
            color: #e0e0e0;
        }

        body.dark .result-card {
            background: rgba(30, 30, 50, 0.88);
            border: 1px solid rgba(80, 80, 100, 0.5);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        body.dark .result-card:hover {
            background: rgba(40, 40, 65, 0.92);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
        }

        body.dark .result-title {
            color: #f0f0f0;
        }
        body.dark .result-title mark {
            background: rgba(255, 120, 150, 0.25);
            color: #ff9eb5;
        }

        body.dark .result-desc {
            color: #b0b0c0;
        }
        body.dark .result-desc mark {
            background: rgba(255, 120, 150, 0.25);
            color: #ff9eb5;
        }

        body.dark .result-tag {
            background: rgba(100, 70, 140, 0.4);
            color: #c8a8e8;
        }

        body.dark .result-source {
            color: #777;
        }

        body.dark .search-count {
            color: #aaa;
        }

        body.dark .search-empty {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="search-header">
        <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> 返回首页</a>
        <form class="search-container" onsubmit="return handleSearchSubmit(event)">
            <input type="text" class="search-input" placeholder="再次搜索..." value="">
            <button type="submit" class="search-btn">搜索</button>
        </form>
        <div class="theme-toggle" id="themeToggle">
            <i class="fas fa-moon"></i>
        </div>
    </div>

    <div class="search-results-page" id="searchResultsPage">
    </div>

    <script src="../scripts/search.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;

            function setInitialTheme() {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    body.classList.add('dark');
                    updateThemeIcon(true);
                } else if (savedTheme === 'light') {
                    body.classList.remove('dark');
                    updateThemeIcon(false);
                } else {
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    if (prefersDark) {
                        body.classList.add('dark');
                        updateThemeIcon(true);
                    } else {
                        updateThemeIcon(false);
                    }
                }
            }

            function updateThemeIcon(isDark) {
                const icon = themeToggle.querySelector('i');
                if (isDark) {
                    icon.className = 'fas fa-sun';
                } else {
                    icon.className = 'fas fa-moon';
                }
            }

            if (themeToggle) {
                setInitialTheme();

                themeToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (body.classList.contains('dark')) {
                        body.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                        updateThemeIcon(false);
                    } else {
                        body.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                        updateThemeIcon(true);
                    }
                });
            }

            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (!localStorage.getItem('theme')) {
                    if (e.matches) {
                        body.classList.add('dark');
                        updateThemeIcon(true);
                    } else {
                        body.classList.remove('dark');
                        updateThemeIcon(false);
                    }
                }
            });
        });
    </script>
</body>
</html>
