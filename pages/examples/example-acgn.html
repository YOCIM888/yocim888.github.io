<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ pageTitle }}</title>
    <style>
        /* 此处保留你原有的所有样式，无需修改 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #f6f2ff;
            background-image: radial-gradient(circle at 20% 30%, #f0e9ff 0%, #faf7ff 70%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #281b4f, #7c5acf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            filter: drop-shadow(0 8px 12px #dacfff);
        }

        .badge-strip {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem 2rem;
            margin: 1.2rem 0 2rem;
        }

        .badge-item {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(6px);
            border-radius: 60px;
            padding: 0.5rem 1.6rem;
            font-weight: 600;
            color: #372e5c;
            border: 1px solid #ffffff;
            box-shadow: 0 6px 14px rgba(154, 120, 255, 0.12);
            font-size: 1rem;
        }

        .intro-msg {
            background: #ffffffd9;
            border-radius: 40px;
            padding: 1.2rem 2.2rem;
            width: fit-content;
            margin: 1.5rem auto 2rem;
            border: 1px solid white;
            box-shadow: 0 12px 28px -10px #ac9ce8;
            font-size: 1.1rem;
            color: #1d123b;
            font-weight: 450;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .intro-msg span {
            background: #6045b3;
            color: white;
            padding: 0.2rem 1.4rem;
            border-radius: 40px;
            font-size: 0.9rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin: 2.5rem 0 2rem;
        }

        .manga-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 1.6rem 1.5rem 1.9rem;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 20px 35px -10px #b7a2f0;
            transition: transform 0.15s ease, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .manga-card:hover {
            transform: translateY(-6px);
            background: white;
            border-color: #d8c7ff;
            box-shadow: 0 30px 45px -12px #9c86e0;
        }

        .manga-card:link,
        .manga-card:visited,
        .manga-card:hover,
        .manga-card:active {
            text-decoration: none;
            color: inherit;
        }

        .card-top {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }

        .rank-badge {
            background: #e2d5ff;
            color: #341f74;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid #b9a1ff;
        }

        .badge-gold {
            background: #ffe9b6;
            border-color: #ccaa6c;
            color: #5b4000;
        }

        .badge-purple {
            background: #e1ceff;
            border-color: #a27beb;
        }

        .badge-blue {
            background: #c7e4ff;
            border-color: #3f86c5;
            color: #10375e;
        }

        .manga-title {
            font-size: 1.7rem;
            font-weight: 750;
            line-height: 1.2;
            color: #1d103b;
            margin: 0.3rem 0 0.2rem;
        }

        .manga-author {
            color: #5f4d8a;
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            border-left: 4px solid #ae94f5;
            padding-left: 0.7rem;
        }

        .recommend-box {
            background: #f2edff;
            border-radius: 24px;
            padding: 1rem 1.2rem;
            margin: 0.8rem 0 1rem;
            border: 1px solid #ffffff;
            box-shadow: inset 0 1px 4px #ffffff, 0 4px 10px rgba(128, 106, 209, 0.1);
        }

        .recommend-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4e2f8b;
            margin-bottom: 0.5rem;
        }

        .recommend-label span {
            background: #cdb7ff;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }

        .recommend-text {
            color: #1e153b;
            font-size: 0.98rem;
            line-height: 1.5;
        }

        .meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
            align-items: center;
        }

        .tag {
            background: white;
            border-radius: 40px;
            padding: 0.2rem 1rem;
            font-size: 0.8rem;
            border: 1px solid #d5c4fd;
            color: #3a2672;
        }

        .tag-strong {
            background: #ffefc9;
            border-color: #e6b85c;
        }

        .footer-note {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2.5rem;
            border-top: 3px dashed #cdbbff;
            color: #463979;
            font-size: 0.95rem;
        }

        .source-line {
            background: #eae0ff;
            border-radius: 60px;
            padding: 0.6rem 2rem;
            display: inline-block;
            margin-bottom: 2rem;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>{{ headerTitle }}</h1>
        <div class="badge-strip">
            {{#each badges}}
            <span class="badge-item">{{ this }}</span>
            {{/each}}
        </div>
        <div class="intro-msg">
            <span>⭐ 每部均有推荐理由</span> {{ intro }}
        </div>
    </div>

    <div class="grid">
        {{#each comics}}
        <a class="manga-card" id="card-{{ id }}" href="#">
            <div class="card-top">
                <span class="rank-badge {{ rankBadgeClass }}">{{ rankText }}</span>
            </div>
            <div class="manga-title">{{ title }}</div>
            <div class="manga-author">{{ author }}</div>
            <div class="recommend-box">
                <div class="recommend-label"><span>推荐理由</span></div>
                <div class="recommend-text">{{ recommendation }}</div>
            </div>
            <div class="meta-tags">
                {{#each tags}}
                <span class="tag">{{ this }}</span>
                {{/each}}
            </div>
        </a>
        {{/each}}
    </div>

    <div class="footer-note">
        <div class="source-line">{{ sourceLine }}</div>
        <p style="margin-top:1.5rem;">{{ footerNote }}</p>
        <p>更新于{{ updateDate }} · {{ comicCount }}部热门榜单</p>
    </div>
</div>
<!-- 如果有公共JS可以保留，没有则删除 -->
<!-- <script src="../scripts/scroll.js"></script> -->
</body>
</html>
