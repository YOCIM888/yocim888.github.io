<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="../../assets/css/game css/Auction-chaos.css"> 
        <div class="game-info">
            <div class="current-item-info">当前：<span id="current-item-name">等待开始</span></div>
            <div class="game-phase">阶段：<span id="game-phase">职业选择</span></div>
            <div>剩余：<span id="items-left">15</span></div>
        </div>
        
        <div class="game-area">
            <div class="auction-section">
                <h2>⚡ 拍卖会 ⚡</h2>
                <div class="auction-item">
                    <div class="item-name" id="item-name">等待开始</div>
                    <div class="item-type" id="item-type">职业卡</div>
                    <div class="item-desc" id="item-desc">拍卖开始后将显示物品详情</div>
                    <div class="item-bid-info">
                        <span>起拍价：<span id="start-price">50</span>金</span>
                        <span>最低加价：<span id="min-bid">5</span>金</span>
                    </div>
                </div>
                
                <div class="current-bid">
                    <div>当前最高：<span id="current-bid-amount">0</span>金</div>
                    <div>出价者：<span id="current-bidder">无</span></div>
                </div>
                
                <div class="bid-controls">
                    <input type="number" id="bid-input" class="bid-input" min="0" max="500" value="50">
                    <button id="bid-button" class="bid-button">出价</button>
                    <button id="pass-button" class="pass-button">放弃</button>
                </div>
                
                <div class="log-section">
                    <div class="log-title">📜 日志</div>
                    <div id="log-container"></div>
                </div>
            </div>
            
            <div class="players-section">
                <!-- 玩家1 卡片 -->
                <div class="player-card player">
                    <div class="player-header">
                        <div class="player-name player">1号 (你)</div>
                        <div class="player-gold"><span id="player1-gold">500</span>💰</div>
                    </div>
                    <div class="health-bar">
                        <div class="health-fill high" id="player1-health-bar" style="width: 100%"></div>
                    </div>
                    <div class="player-stats">
                        <div class="stat-item"><span class="stat-label">血量</span><span class="stat-value" id="player1-health">1000</span></div>
                        <div class="stat-item"><span class="stat-label">攻击</span><span class="stat-value" id="player1-attack">50</span></div>
                        <div class="stat-item"><span class="stat-label">防御</span><span class="stat-value" id="player1-defense">10</span></div>
                        <div class="stat-item"><span class="stat-label">穿透</span><span class="stat-value" id="player1-penetration">0%</span></div>
                    </div>
                    <div class="stat-item"><span class="stat-label">职业</span><span class="stat-value" id="player1-class">无</span></div>
                    <div class="stat-item"><span class="stat-label">敌人</span><span class="stat-value" id="player1-enemy">2号</span></div>
                    <div class="stat-item"><span class="stat-label">物品</span><span class="stat-value" id="player1-items">无</span></div>
                </div>
                <!-- 玩家2 卡片 -->
                <div class="player-card computer">
                    <div class="player-header">
                        <div class="player-name computer">2号 (电脑)</div>
                        <div class="player-gold"><span id="player2-gold">500</span>💰</div>
                    </div>
                    <div class="health-bar">
                        <div class="health-fill high" id="player2-health-bar" style="width: 100%"></div>
                    </div>
                    <div class="player-stats">
                        <div class="stat-item"><span class="stat-label">血量</span><span class="stat-value" id="player2-health">1000</span></div>
                        <div class="stat-item"><span class="stat-label">攻击</span><span class="stat-value" id="player2-attack">50</span></div>
                        <div class="stat-item"><span class="stat-label">防御</span><span class="stat-value" id="player2-defense">10</span></div>
                        <div class="stat-item"><span class="stat-label">穿透</span><span class="stat-value" id="player2-penetration">0%</span></div>
                    </div>
                    <div class="stat-item"><span class="stat-label">职业</span><span class="stat-value" id="player2-class">无</span></div>
                    <div class="stat-item"><span class="stat-label">敌人</span><span class="stat-value" id="player2-enemy">3号</span></div>
                    <div class="stat-item"><span class="stat-label">物品</span><span class="stat-value" id="player2-items">无</span></div>
                </div>
                <!-- 玩家3 卡片 -->
                <div class="player-card computer">
                    <div class="player-header">
                        <div class="player-name computer">3号 (电脑)</div>
                        <div class="player-gold"><span id="player3-gold">500</span>💰</div>
                    </div>
                    <div class="health-bar">
                        <div class="health-fill high" id="player3-health-bar" style="width: 100%"></div>
                    </div>
                    <div class="player-stats">
                        <div class="stat-item"><span class="stat-label">血量</span><span class="stat-value" id="player3-health">1000</span></div>
                        <div class="stat-item"><span class="stat-label">攻击</span><span class="stat-value" id="player3-attack">50</span></div>
                        <div class="stat-item"><span class="stat-label">防御</span><span class="stat-value" id="player3-defense">10</span></div>
                        <div class="stat-item"><span class="stat-label">穿透</span><span class="stat-value" id="player3-penetration">0%</span></div>
                    </div>
                    <div class="stat-item"><span class="stat-label">职业</span><span class="stat-value" id="player3-class">无</span></div>
                    <div class="stat-item"><span class="stat-label">敌人</span><span class="stat-value" id="player3-enemy">1号</span></div>
                    <div class="stat-item"><span class="stat-label">物品</span><span class="stat-value" id="player3-items">无</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="winner-section" id="winner-section">
        <div class="winner-content">
            <div class="winner-title">🏆 游戏结束 🏆</div>
            <div class="winner-name" id="winner-name">胜利者</div>
            <button class="restart-button" id="restart-button">重新开始游戏</button>
        </div>
    </div>
    <script src="../../assets/js/game js/Auction-chaos.js"></script>
    </body>
</html>
