<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星陨之夜</title>
    <!-- 字体与图标库 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    <!-- 外部独立CSS -->
    <link rel="stylesheet" href="../../assets/css/game css/starfall_night_game.css">
</head>
<body>
    <!-- 设置界面 -->
    <div id="setup-screen" class="screen-center">
        <div class="cyber-panel setup-panel">
            <h1 class="glitch-title" data-text="星陨之夜">星陨之夜</h1>
            <p class="neon-sub">NEON NIGHTFALL</p>
            
            <div class="input-group">
                <label for="player-count">⚡ 选择游戏人数</label>
                <select id="player-count" class="cyber-select">
                    <option value="6">6人局</option>
                    <option value="8">8人局</option>
                    <option value="10">10人局</option>
                    <option value="12">12人局</option>
                    <option value="14" selected>14人局</option>
                </select>
            </div>

            <div class="input-group">
                <label for="player-identity">🤖 你的身份</label>
                <select id="player-identity" class="cyber-select">
                    <!-- 动态填充角色 -->
                </select>
            </div>
            
            <button id="start-game" class="cyber-button">启动·星陨</button>
        </div>
    </div>

    <!-- 游戏主界面 (三栏赛博格) -->
    <div id="game-screen" class="hidden game-dashboard">
        <!-- 左侧：玩家网格 (头像) -->
        <div class="left-panel cyber-panel">
            <h2 class="panel-title"><i class="fas fa-user-astronaut"></i> 玩家状态</h2>
            <div id="player-grid" class="player-grid">
                <!-- 动态生成头像 -->
            </div>
        </div>

        <!-- 中间：操作面板 (技能/投票/刀人) -->
        <div class="mid-panel cyber-panel">
            <div class="phase-indicator">
                <span id="game-phase">黑夜阶段</span>
                <span id="game-round">第1轮</span>
            </div>
            <div id="skill-panel" class="skill-panel">
                <h3><i class="fas fa-microchip"></i> 核心技能</h3>
                <div id="human-skill-display" class="skill-display">
                    <!-- 技能描述动态 -->
                </div>
                <div id="skill-uses" class="skill-uses"></div>
            </div>
            <div id="action-area" class="action-area">
                <!-- 发言/投票/行动按钮 动态切换 -->
                <button id="speak-btn" class="cyber-button small"><i class="fas fa-comment-dots"></i> 发言频道</button>
                <div id="vote-area" class="hidden">
                    <h4>⚙ 终端投票</h4>
                    <div id="vote-options" class="vote-grid"></div>
                    <button id="submit-vote" class="cyber-button small">确认·放逐</button>
                </div>
                <div id="night-action-area" class="hidden">
                    <!-- 夜间技能占位(简化) -->
                    <p class="dim-text"><i class="fas fa-skull"></i> 夜视仪激活……系统自动结算</p>
                </div>
            </div>
            <button id="next-phase" class="cyber-button hidden">进入下一阶段</button>
        </div>

        <!-- 右侧：通讯记录 (发言) -->
        <div class="right-panel cyber-panel">
            <h2 class="panel-title"><i class="fas fa-satellite-dish"></i> 加密频道</h2>
            <div id="chat-area" class="chat-area"></div>
        </div>
    </div>

    <!-- 胜利界面 -->
    <div id="victory-screen" class="hidden screen-center victory-screen">
        <div class="cyber-panel victory-panel">
            <h1 class="glitch-title" data-text="GAME OVER">GAME OVER</h1>
            <div id="victory-message" class="victory-msg">阵营胜利</div>
            <button id="restart-game" class="cyber-button">重新接入</button>
        </div>
    </div>

    <!-- 外部JS -->
    <script src="../../assets/js/game js/starfall_night_game.js"></script>
</body>
</html>
