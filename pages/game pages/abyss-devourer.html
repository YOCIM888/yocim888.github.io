<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>深渊吞噬者</title>
    <link rel="stylesheet" href="../../assets/css/game css/abyss-devourer.css">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
    </style>
</head>
<body>
    <div class="cyber-container">
        <div class="canvas-hud-wrapper">
            <canvas id="gameCanvas" width="1000" height="1000"></canvas>
            <!-- 头部 -->
            <div class="hud-top">
                <span class="game-title glitch" data-text="深渊吞噬者">深渊吞噬者</span>
                <span class="player-score" id="scoreDisplay">⚡质量: 15</span>
            </div>
            <div class="hud-corner corner-br">
                <span class="warning">▲ 神经接入中 ▼</span>
            </div>
        </div>
    </div>

    <!-- 触摸/鼠标提示（仅装饰） -->
    <div class="cyber-footer">
        <span>⚡ 移动: 鼠标 / 手指 ⚡</span>
    </div>
    <script src="../../assets/js/game js/abyss-devourer.js"></script>
</body>
</html>
